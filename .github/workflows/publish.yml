name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  publish-nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore stylobot-extract.sln

      - name: Resolve package version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Tag pushes (refs/tags/v1.2.3) -> 1.2.3. workflow_dispatch on main -> 0.0.0-dev.<sha>.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: $VERSION"

      - name: Build (Release)
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: dotnet build stylobot-extract.sln -c Release --no-restore -p:Version="$PKG_VERSION"

      - name: Test
        run: dotnet test stylobot-extract.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Pack all publishable packages
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p artifacts
          for proj in \
            src/StyloExtract.Abstractions \
            src/StyloExtract.Html \
            src/StyloExtract.Fingerprint \
            src/StyloExtract.Templates \
            src/StyloExtract.Heuristics \
            src/StyloExtract.Markdown \
            src/StyloExtract.Core \
            src/StyloExtract.AspNetCore \
            src/StyloExtract.Playwright; do
            echo "=== Packing $proj at $PKG_VERSION ==="
            dotnet pack "$proj" -c Release --no-build -o artifacts -p:Version="$PKG_VERSION"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.nupkg

      # NuGet trusted publishing via OIDC.
      # Configure on NuGet.org under Account Settings, Trusted Publishers:
      #   Repository owner: scottgal
      #   Repository name:  styloextract
      #   Workflow:         .github/workflows/publish.yml
      # The GitHub Actions OIDC token is exchanged for a short-lived NuGet
      # token at push time. No stored secret involved.
      - name: NuGet login via OIDC
        uses: NuGet/login@ebc737b6fc418a6ca0073cf116ec8dc156d8b81e  # v1
        id: nuget_login
        with:
          user: mostlylucid

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

  build-binaries:
    needs: publish-nuget
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            ext: ""
            archive: tar.gz
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            ext: ""
            archive: tar.gz
          - rid: win-x64
            os: windows-latest
            ext: ".exe"
            archive: zip
          - rid: osx-x64
            os: macos-latest
            ext: ""
            archive: tar.gz
          - rid: osx-arm64
            os: macos-latest
            ext: ""
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish AOT binary (stylo-extract)
        shell: bash
        run: |
          dotnet publish src/StyloExtract.Cli.Aot \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:InvariantGlobalization=true \
            -p:StripSymbols=true \
            -o publish/aot

      - name: Publish R2R binary (stylo-extract-playwright)
        shell: bash
        run: |
          dotnet publish src/StyloExtract.Cli \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishReadyToRun=true \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            -o publish/r2r

      - name: Archive binaries (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          tar -czf dist/stylo-extract-${{ matrix.rid }}.tar.gz \
            -C publish/aot stylo-extract${{ matrix.ext }}
          tar -czf dist/stylo-extract-playwright-${{ matrix.rid }}.tar.gz \
            -C publish/r2r stylo-extract-playwright${{ matrix.ext }}

      - name: Archive binaries (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p dist
          cd publish/aot
          7z a ../../dist/stylo-extract-${{ matrix.rid }}.zip stylo-extract${{ matrix.ext }}
          cd ../../publish/r2r
          7z a ../../dist/stylo-extract-playwright-${{ matrix.rid }}.zip stylo-extract-playwright${{ matrix.ext }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.rid }}
          path: dist/

  attach-to-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: release-assets/

      - name: Determine release type
        id: release_type
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$TAG" =~ -(alpha|beta|rc)[0-9]* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          body: |
            ## StyloExtract ${{ github.ref_name }}

            ### NuGet packages

            All nine packages are published to NuGet.org. Add the one you need:

            ```
            dotnet add package Mostlylucid.StyloExtract.AspNetCore
            dotnet add package Mostlylucid.StyloExtract.Playwright   # optional: JS-rendered fetching
            ```

            Full package list and docs at https://scottgal.github.io/styloextract/

            ### CLI binaries

            Two flavors per platform:

            - `stylo-extract-<rid>` (AOT, lean): `extract`, `export`, `import`, `monitor`. No Playwright.
            - `stylo-extract-playwright-<rid>` (R2R, self-contained): adds `--rendered` flag and `install-browsers`.

            Download the archive for your platform below, extract, and run.

            | Platform | AOT binary | R2R binary |
            |----------|-----------|------------|
            | Linux x64 | `stylo-extract-linux-x64.tar.gz` | `stylo-extract-playwright-linux-x64.tar.gz` |
            | Linux arm64 | `stylo-extract-linux-arm64.tar.gz` | `stylo-extract-playwright-linux-arm64.tar.gz` |
            | Windows x64 | `stylo-extract-win-x64.zip` | `stylo-extract-playwright-win-x64.zip` |
            | macOS x64 | `stylo-extract-osx-x64.tar.gz` | `stylo-extract-playwright-osx-x64.tar.gz` |
            | macOS arm64 | `stylo-extract-osx-arm64.tar.gz` | `stylo-extract-playwright-osx-arm64.tar.gz` |
          files: release-assets/**
