name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore stylobot-extract.sln

      - name: Build (Release)
        run: dotnet build stylobot-extract.sln -c Release --no-restore

      - name: Test
        run: dotnet test stylobot-extract.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Pack all publishable packages
        run: |
          mkdir -p artifacts
          for proj in \
            src/StyloExtract.Abstractions \
            src/StyloExtract.Html \
            src/StyloExtract.Fingerprint \
            src/StyloExtract.Templates \
            src/StyloExtract.Heuristics \
            src/StyloExtract.Markdown \
            src/StyloExtract.Core \
            src/StyloExtract.AspNetCore \
            src/StyloExtract.Playwright; do
            echo "=== Packing $proj ==="
            dotnet pack "$proj" -c Release --no-build -o artifacts
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.nupkg

      # NuGet trusted publishing via OIDC.
      # Configure on NuGet.org under Account Settings, Trusted Publishers:
      #   Repository owner: scottgal
      #   Repository name:  styloextract
      #   Workflow:         .github/workflows/publish.yml
      # The GitHub Actions OIDC token is exchanged for a short-lived NuGet
      # token at push time. No stored secret involved.
      - name: NuGet login via OIDC
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: scottgal

      - name: Push to NuGet.org
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
